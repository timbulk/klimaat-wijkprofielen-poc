# =============================================================================
# klimaat-wijkprofielen-poc  —  default configuration
# =============================================================================
# All paths are relative to the project root (where this file lives).
# CLI arguments always override these values.
# Tip: copy to config.local.yaml (git-ignored) for personal overrides.

# -----------------------------------------------------------------------------
# Input: CBS Wijk- en Buurtenkaart
# Download: https://www.pdok.nl/downloads/-/article/cbs-wijk-en-buurtkaart
# -----------------------------------------------------------------------------
cbs_path: data/raw/wijkenbuurten_2023.gpkg
cbs_layer: buurten_2023          # layer inside the GeoPackage; null = first layer

# -----------------------------------------------------------------------------
# Input: Klimaateffectatlas — local rasters
# Each entry:  prefix: relative/path/to/file.tif
# The prefix becomes the column-name prefix in the output (e.g. hitte_mean).
# Download GeoTIFFs from: https://www.klimaateffectatlas.nl
# Comment out entries you haven't downloaded yet.
# -----------------------------------------------------------------------------
rasters:
  hitte:    data/raw/hitte_gevoelstemperatuur.tif
  droogte:  data/raw/droogte_neerslagtekort.tif
  # wateroverlast: data/raw/wateroverlast_overstroming.tif

# -----------------------------------------------------------------------------
# Input: Klimaateffectatlas — WMS (live download, no local file needed)
# Set wms_layer to a layer name to enable WMS download.
# Set to null to disable WMS and use only local rasters.
#
# Available layers can be listed with:
#   python -c "
#     from scripts.wms_utils import connect_wms, DEFAULT_WMS_URL
#     wms = connect_wms(DEFAULT_WMS_URL)
#     print('\n'.join(wms.contents.keys()))
#   "
# -----------------------------------------------------------------------------
wms_layer: hitteeiland_r_hitte   # set to null to disable
wms_url: https://cas.cloud.sogelink.com/public/data/org/gws/YWFMLMWERURF/kea_public/wms
wms_resolution: 50              # metres per pixel (50 = fast; 10 = detailed)
# wms_buffer: 500                 # buffer in metres around gemeente bbox (default: 500)

# -----------------------------------------------------------------------------
# Filter
# Set to null to process all municipalities.
# -----------------------------------------------------------------------------
gemeente: Eindhoven              # e.g. Utrecht, Haarlem, Tilburg, Breda — or null

# -----------------------------------------------------------------------------
# Zonal statistics
# Choices: mean max min std count sum median range
#          majority minority variety percentile_25 percentile_75
# -----------------------------------------------------------------------------
stats:
  - mean
  - max
  - std
  - count

# -----------------------------------------------------------------------------
# Threshold
# Pixels with value > threshold counted as percentage per polygon.
# Set to null to skip.
# -----------------------------------------------------------------------------
threshold: 30.0

# -----------------------------------------------------------------------------
# Output directory (GeoPackage filename is derived from gemeente name)
# -----------------------------------------------------------------------------
output_dir: output