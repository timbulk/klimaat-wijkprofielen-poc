# =============================================================================
# klimaat-wijkprofielen-poc — configuratie
# =============================================================================
#
# Alle paden zijn relatief aan de projectroot (waar dit bestand staat).
# CLI-argumenten hebben altijd voorrang op deze waarden.
#
# Tip: kopieer dit bestand naar config.local.yaml voor persoonlijke
# instellingen zonder het origineel te wijzigen (.local.yaml is git-ignored).
# =============================================================================


# -----------------------------------------------------------------------------
# CBS Wijk- en Buurtenkaart
#
# Download het GeoPackage op:
#   https://www.pdok.nl/downloads/-/article/cbs-wijk-en-buurtkaart
#
# Sla het op als:  data/raw/wijkenbuurten_2023.gpkg
# Laagnamen zijn doorgaans 'buurten_2023' of 'wijken_2023'.
# Zet cbs_layer op null om de eerste beschikbare laag te gebruiken.
# -----------------------------------------------------------------------------
cbs_path:  data/raw/wijkenbuurten.gpkg
cbs_layer: wijken


# -----------------------------------------------------------------------------
# Gemeente-filter
#
# Vul hier de naam in van de gemeente die je wilt analyseren.
# De naam moet exact overeenkomen met de waarden in de CBS-data
# (hoofdlettergevoelig, bijv. 'Eindhoven' niet 'eindhoven').
#
# Zet op null om alle gemeenten te verwerken.
# Alternatieven: Utrecht, Haarlem, Tilburg, Breda, Groningen
# -----------------------------------------------------------------------------
gemeente: Amsterdam


# -----------------------------------------------------------------------------
# Lokale rasters (GeoTIFF-bestanden van Klimaateffectatlas)
#
# Standaard uitgeschakeld — WMS is de primaire databron (zie hieronder).
# Schakel in door de commentaar-tekens te verwijderen en de paden in te vullen.
#
# Download rasters op:  https://www.klimaateffectatlas.nl
# Formaat:  prefix: pad/naar/bestand.tif
# -----------------------------------------------------------------------------
#rasters:
  # hitte:    data/raw/hitte_gevoelstemperatuur.tif
  # droogte:  data/raw/droogte_neerslagtekort.tif
  # wateroverlast: data/raw/wateroverlast_overstroming.tif


# -----------------------------------------------------------------------------
# WMS-raster (standaard actief — geen lokaal bestand nodig)
#
# De download wordt automatisch beperkt tot de bbox van de gekozen gemeente.
# Zet wms_layer op null om WMS uit te schakelen.
#
# Beschikbare lagen bekijken:
#   python -c "
#     import sys; sys.path.insert(0,'scripts')
#     from wms_utils import connect_wms, DEFAULT_WMS_URL
#     wms = connect_wms(DEFAULT_WMS_URL)
#     print('\n'.join(wms.contents.keys()))
#   "
# -----------------------------------------------------------------------------
wms_layer: hitteeiland   # null = uitgeschakeld
wms_url:   https://cas.cloud.sogelink.com/public/data/org/gws/YWFMLMWERURF/kea_public/wms
wms_resolution: 50               # pixels in meters (50 = snel; 10 = gedetailleerd)
wms_buffer: 500                  # buffer in meters rondom de gemeente-bbox


# -----------------------------------------------------------------------------
# Zonal statistics
#
# Keuze uit: mean  max  min  std  count  sum  median  range
#            majority  minority  variety  percentile_25  percentile_75
# -----------------------------------------------------------------------------
stats:
  - mean
  - max
  - std
  - count


# -----------------------------------------------------------------------------
# Drempelwaarde (optioneel)
#
# Berekent per raster het percentage pixels met waarde > threshold.
# Kolom wordt toegevoegd als {prefix}_pct_above_{threshold}.
# Zet op null om de drempelwaarde-berekening over te slaan.
# -----------------------------------------------------------------------------
threshold: 30.0                  # bijv. 30.0 voor hittestress-analyse


# -----------------------------------------------------------------------------
# Uitvoer
#
# GeoPackages worden weggeschreven naar output_dir.
# De bestandsnaam wordt afgeleid van de gemeente (bijv. eindhoven_klimaat.gpkg).
# -----------------------------------------------------------------------------
output_dir: output